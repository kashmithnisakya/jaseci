[project]
name = "pubsub-example"
version = "1.0.0"
description = "Minimal pub/sub example for jac-scale"
entry-point = "app.jac"

[plugins.scale]

# Enable the message broker. With this off (the default), publish() and
# @subscribe become zero-overhead no-ops.
[plugins.scale.pubsub]
enabled = true
broker = "redis_streams"
url = "redis://localhost:6379/0"
consumer_group = "pubsub-example"

[plugins.scale.pubsub.retry]
max_attempts = 3
backoff_seconds = [1, 5, 30]
dead_letter_suffix = ".dlq"
