name: Experimental jac image (per-PR)

# Build or delete a per-PR experimental image on demand. Manual only
# (workflow_dispatch): write access is the vouch for building contributor HEAD
# with the push token in scope, and for deleting a published tag.
#   action=build  -> publish jaseci/jaclang:experimental-<PR#> from the PR's HEAD
#   action=delete -> remove that tag from Docker Hub once the PR is done
# Deploy from it with [experimental] pr = <PR#> in jac.toml.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Build the image, or delete it"
        type: choice
        default: build
        options: [build, delete]
      pr:
        description: "PR number (image tag is experimental-<PR#>)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: experimental-image-${{ inputs.pr }}
  cancel-in-progress: true

jobs:
  resolve:
    if: inputs.action == 'build' && github.repository == 'jaseci-labs/jac'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pr: ${{ inputs.pr }}
    steps:
      - name: Verify the PR is open
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ inputs.pr }}
        run: |
          set -euo pipefail
          state="$(gh pr view "$PR" --json state --jq .state)"
          if [ "$state" != "OPEN" ]; then
            echo "::error::PR #$PR is $state; experimental images are built only for OPEN PRs."
            exit 1
          fi
          echo "PR #$PR is open; building refs/pull/$PR/head."

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        # One native runner per arch: setup-jac builds host-native, no cross-compile.
        include:
          - os: ubuntu-latest
            platform: amd64
          - os: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      # refs/pull/<N>/head lives on the base repo, so fork PRs resolve too.
      # SHA-pinned: this job builds contributor code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: refs/pull/${{ needs.resolve.outputs.pr }}/head

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Stage the binary
        run: |
          set -euxo pipefail
          mkdir -p out
          cp jac/zig-out/bin/jac out/jac
          chmod +x out/jac

      - name: Upload the arch binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jac-experimental-${{ matrix.platform }}
          path: out/jac
          if-no-files-found: error

  image:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      # Presence flag ("true"/"false"): `secrets` is not available in step `if:`
      # expressions, and the token value itself must not sit in env.
      DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      # Only the Dockerfile is needed; the binaries carry the PR's code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Fail if publishing secrets are missing (org repo)
        if: github.repository == 'jaseci-labs/jac' && (env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN_SET != 'true')
        run: |
          echo "::error::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN are not configured; cannot publish the experimental image."
          exit 1

      - name: Fetch the amd64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: jac-experimental-amd64
          path: ctx/amd64

      - name: Fetch the arm64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: jac-experimental-arm64
          path: ctx/arm64

      - name: Stage the build context
        run: |
          set -euxo pipefail
          chmod +x ctx/amd64/jac ctx/arm64/jac
          cp docker/jaclang.Dockerfile ctx/Dockerfile

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        if: env.DOCKERHUB_USERNAME != ''

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        if: env.DOCKERHUB_USERNAME != ''

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: env.DOCKERHUB_USERNAME != ''
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ctx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: jaseci/jaclang:experimental-${{ needs.resolve.outputs.pr }}

      - name: Summary
        if: env.DOCKERHUB_USERNAME != ''
        env:
          PR: ${{ needs.resolve.outputs.pr }}
        run: |
          {
            echo "## Experimental image published"
            echo ""
            echo '`jaseci/jaclang:experimental-'"$PR"'`'
            echo ""
            echo "Point a deploy at it with \`[experimental] pr = $PR\` in jac.toml."
            echo "When done, delete it by re-running this workflow with action=delete."
          } >> "$GITHUB_STEP_SUMMARY"

  delete:
    if: inputs.action == 'delete' && github.repository == 'jaseci-labs/jac'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete the experimental tag from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PR: ${{ inputs.pr }}
        run: |
          set -euo pipefail
          REPO="jaseci/jaclang"
          TAG="experimental-${PR}"
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "::error::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN are not configured."
            exit 1
          fi
          JWT="$(curl -fsSL -H 'Content-Type: application/json' \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)"
          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "::error::Docker Hub login failed; cannot delete ${REPO}:${TAG}."
            exit 1
          fi
          code="$(curl -s -o /dev/null -w '%{http_code}' -X DELETE \
            -H "Authorization: JWT ${JWT}" \
            "https://hub.docker.com/v2/repositories/${REPO}/tags/${TAG}/")"
          case "$code" in
            204) echo "Deleted ${REPO}:${TAG}." ;;
            404) echo "${REPO}:${TAG} not found (never built or already deleted); nothing to do." ;;
            # 403 comes back before 404 when the token cannot delete, so a
            # missing tag still fails here rather than reporting "not found".
            403) echo "::error::Docker Hub returned 403 deleting ${REPO}:${TAG}; the access token lacks delete permission."; exit 1 ;;
            *)   echo "::error::Unexpected HTTP ${code} deleting ${REPO}:${TAG}."; exit 1 ;;
          esac
