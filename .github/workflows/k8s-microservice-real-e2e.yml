name: K8s Microservice Real E2E


on:
  workflow_dispatch:
  pull_request:
    # Heavy microk8s e2e (~25 min). Only the jac runtime + the scale deploy
    # pipeline can affect it, so skip PRs that touch neither (docs, byllm, mcp,
    # etc.). This job is NOT a required status check, so a path-skip is safe -
    # it won't leave a PR waiting on a check that never reports.
    paths:
      - 'jac/**'
      - '.github/workflows/k8s-microservice-real-e2e.yml'

# Cancel superseded PR runs; never cancel a run for a commit on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  real-e2e:
    name: microk8s real-app smoke
    # Escape hatch: add the 'skip-k8s' label to a PR to skip this job too
    # (matches the test-scale-k8s gate in test-jaseci.yml).
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-k8s') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download the prebuilt dev jac binary (host deploy driver)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          arch="$(uname -m)"   # x86_64 on this runner
          mkdir -p "$HOME/.local/bin"
          gh release download dev --repo jaseci-labs/jaseci \
            --pattern "jac-dev-linux-${arch}" \
            --output "$HOME/.local/bin/jac" --clobber
          chmod +x "$HOME/.local/bin/jac"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/jac" --version

      - name: Overlay this checkout's jaclang onto the downloaded binary
        run: |
          printf '\n[dev]\njaclang_source = "%s/jac"\n' "$GITHUB_WORKSPACE" \
            >> jac/jaclang/scale/tests/fixtures/k8s_e2e/jac.toml

      - name: Install scale deploy deps (global; scale ships with jaclang)
        # Scale is built into jaclang (jaclang.scale); install its deploy + data
        # + serve closure so the e2e app can import it. Pins mirror
        # jac/jaclang/project/capabilities.jac.
        run: |
          jac install \
            "fastapi>=0.121.3,<0.122.0" "uvicorn[standard]>=0.38.0,<0.39.0" \
            "pyjwt>=2.10.1,<2.11.0" "fastapi-sso>=0.21.0,<1.0.0" \
            "python-multipart>=0.0.21,<1.0.0" "bcrypt>=4.0.0,<5.0.0" \
            "aiohttp>=3.9.0,<4.0.0" "sqlalchemy>=2.0.0,<3.0.0" \
            "email-validator>=2.3.0,<3.0.0" "python-dotenv>=1.2.1,<2.0.0" \
            "pymongo>=4.15.4,<5.0.0" "redis>=7.1.0,<8.0.0" \
            "kubernetes>=34.1.0,<35.0.0" "docker>=7.1.0,<8.0.0" \
            --global

      - name: Set up microk8s
        run: |
          sudo snap install microk8s --classic --channel=1.30/stable
          sudo microk8s status --wait-ready --timeout 180
          sudo microk8s enable dns:8.8.8.8,1.1.1.1
          # hostpath-storage provides the default StorageClass. Without it the
          # bundle PVC (nil storageClassName -> needs a default SC) never binds
          # and the bundle-loader pod hangs Pending. Its provisioner also binds
          # the ReadWriteMany bundle PVC on a single node.
          sudo microk8s enable hostpath-storage
          sudo microk8s status --wait-ready --timeout 180
          sudo usermod -aG microk8s "$USER"
          mkdir -p "$HOME/.kube"
          sudo microk8s config | sudo tee "$HOME/.kube/config" >/dev/null
          sudo chown "$USER" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl -n kube-system set env daemonset/calico-node IP_AUTODETECTION_METHOD=can-reach=8.8.8.8
          kubectl -n kube-system rollout restart daemonset/calico-node
          kubectl -n kube-system rollout status daemonset/calico-node --timeout=240s || true
          kubectl -n kube-system wait --for=condition=ready pod -l k8s-app=calico-node --timeout=240s || echo "WARN: calico-node not Ready"
          kubectl -n kube-system wait --for=condition=ready pod -l k8s-app=kube-dns --timeout=120s || echo "WARN: coredns not Ready"

      - name: Verify pod DNS + egress (fail fast)
        run: |
          kubectl run netcheck --image=busybox:1.36 --restart=Never --command -- \
            sh -c 'nslookup deb.debian.org && wget -q --spider http://deb.debian.org/ && echo NETCHECK_OK'
          if ! kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/netcheck --timeout=150s; then
            echo "::error::Pod networking/egress is broken on this runner (DNS or CNI), so no app pod can bootstrap."
            kubectl logs netcheck || true
            kubectl describe pod netcheck || true
            kubectl get pods -n kube-system -o wide || true
            kubectl delete pod netcheck --ignore-not-found
            exit 1
          fi
          kubectl logs netcheck
          kubectl delete pod netcheck --ignore-not-found

      - name: Pre-pull + enable addons (best-effort)
        # registry.k8s.io has been flaky on GHA. Pre-pulling via
        # containerd directly lets us retry without restarting the
        # kubelet's image-pull state machine.
        continue-on-error: true
        run: |
          for img in registry.k8s.io/metrics-server/metrics-server:v0.7.2 \
                     registry.k8s.io/ingress-nginx/controller:v1.10.1; do
            for _ in 1 2 3; do sudo microk8s ctr images pull "$img" && break; sleep 5; done
          done
          sudo microk8s enable metrics-server || echo "WARN: metrics-server enable failed"
          sudo microk8s enable ingress || echo "WARN: ingress enable failed"
          kubectl wait --namespace ingress --for=condition=ready pod \
              --selector=name=nginx-ingress-microk8s --timeout=180s \
              || echo "WARN: ingress controller not ready; K10 path will skip"

      - name: Show cluster info
        run: |
          kubectl version
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Run K8s microservice real-app e2e
        env:
          CLUSTER_TYPE: microk8s
        run: |
          bash jac/jaclang/scale/scripts/k8s_microservice_real_e2e.sh \
              jac/jaclang/scale/tests/fixtures/k8s_e2e

      - name: Dump kubectl state on failure
        if: failure()
        env:
          NS: jac-e2e
        run: |
          echo "=== nodes ==="; kubectl get nodes -o wide || true
          echo "=== all pods (every namespace) ==="; kubectl get pods -A -o wide || true
          echo "=== events (${NS}, time-sorted) ==="
          kubectl get events -n "${NS}" --sort-by='.lastTimestamp' || true
          echo "=== per-pod status + all container logs (${NS}) ==="
          for pod in $(kubectl get pods -n "${NS}" -o name 2>/dev/null); do
            echo "############################## ${pod} ##############################"
            echo "----- phase + container readiness -----"
            kubectl get -n "${NS}" "${pod}" -o jsonpath='phase={.status.phase}{"\n"}{range .status.initContainerStatuses[*]}init/{.name}: ready={.ready} restarts={.restartCount} state={.state}{"\n"}{end}{range .status.containerStatuses[*]}main/{.name}: ready={.ready} restarts={.restartCount} state={.state}{"\n"}{end}' 2>/dev/null || true
            echo ""
            echo "----- describe (Init Containers -> Events) -----"
            kubectl describe -n "${NS}" "${pod}" 2>/dev/null | sed -n '/Init Containers:/,/^[^ ]/p;/Events:/,$p' || true
            for c in $(kubectl get -n "${NS}" "${pod}" -o jsonpath='{range .spec.initContainers[*]}{.name}{"\n"}{end}{range .spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null); do
              echo "----- logs ${pod} [${c}] (tail 120) -----"
              kubectl logs -n "${NS}" "${pod}" -c "${c}" --tail=120 2>&1 | tail -120 || true
              kubectl logs -n "${NS}" "${pod}" -c "${c}" --previous --tail=60 2>/dev/null | tail -60 || true
            done
          done
          echo "=== ingress status ==="; kubectl describe ingress -n "${NS}" || true
          echo "=== ingress controller logs ==="
          kubectl logs -n ingress -l name=nginx-ingress-microk8s --tail=50 || true
